<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aliwa</title>
    <meta name="description" content="Plataforma para negocios que operan por WhatsApp. Gestiona conversaciones, citas, clientes y pagos desde un solo lugar." />
    <meta property="og:title" content="Aliwa" />
    <meta property="og:description" content="Plataforma para negocios que operan por WhatsApp. Gestiona conversaciones, citas, clientes y pagos desde un solo lugar." />
    <meta property="og:image" content="https://aliwa.mx/og-image.png" />
    <meta property="og:url" content="https://aliwa.mx" />
    <meta property="og:type" content="website" />
    <meta property="fb:app_id" content="997289503159629" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <script>
      // Aplica el tema ANTES del primer render (evita flash y hace que
      // login/registro respeten la preferencia guardada o la del sistema).
      (function () {
        try {
          var guardado = localStorage.getItem('aliwa-theme')
          var oscuro = guardado
            ? guardado === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.toggle('dark', oscuro)
        } catch (e) { /* sin localStorage: se queda en claro */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/es_LA/sdk.js"></script>
  </body>
</html>
